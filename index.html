<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Piano Hero - Sync Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#05050e;color:#fff;font-family:'Rajdhani',sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;}
.screen{display:none;width:100%;height:100%;flex-direction:column}
.screen.active{display:flex}

/* HOME */
#homeScreen{align-items:center;justify-content:center;gap:18px;padding:20px 18px;background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(0,80,200,.22) 0%,transparent 65%),#05050e;position:relative;}
.logo-main{font-family:'Orbitron',monospace;font-size:clamp(28px,8vw,62px);font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,#fff 0%,#00f5ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px rgba(0,245,255,.5));}
.upload-zone{border:2px dashed rgba(0,245,255,.2);border-radius:14px;padding:20px;text-align:center;cursor:pointer;background:rgba(0,245,255,.02);max-width:400px;width:100%;}
#fileInput{display:none}

.btn{border:none;cursor:pointer;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:8px;padding:12px 30px;transition:0.2s;}
.btn-glow{background:linear-gradient(135deg,#00f5ff,#0077aa);color:#000;box-shadow:0 0 20px rgba(0,245,255,.4);}
.btn-glow:disabled{opacity:0.3;pointer-events:none}

/* GAME SCREEN */
#gameScreen{background:#02020a;position:relative}
#hud{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:60px;background:rgba(0,0,0,0.8);border-bottom:1px solid rgba(0,245,255,0.1);z-index:100;}
.hud-v{font-family:'Orbitron',monospace;font-size:20px;color:#00f5ff}
#healthTrack{width:120px;height:10px;background:#111;border-radius:5px;overflow:hidden;border:1px solid #333}
#healthFill{height:100%;width:100%;background:#39ff14;transition:0.2s}

#waitBar{display:none;position:absolute;top:60px;width:100%;text-align:center;background:rgba(255,204,0,0.2);padding:5px;z-index:50;}
#waitText{font-family:'Orbitron',monospace;font-size:12px;color:#ffcc00;letter-spacing:2px}

#stageWrap{flex:1;position:relative;background:#02020a;overflow:hidden;}
#laneCanvas{position:absolute;inset:0;width:100%;height:100%;}
#feedback{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:30px;font-weight:900;pointer-events:none;opacity:0;z-index:110;text-shadow:0 0 20px currentColor;}

#pianoWrapper{height:160px;background:#05050e;padding:10px;border-top:2px solid #00f5ff33}
#keysRow{display:flex;gap:8px;height:100%;}
.bigkey{flex:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:'Orbitron';border:2px solid #ffffff11;transition:0.05s;touch-action:none;}
.bigkey.pressed{transform:scale(0.95);filter:brightness(1.5);}
.bigkey.waiting{border-color:#ffcc00;box-shadow:0 0 20px #ffcc0066;}

#gameOverOv {display:none;position:absolute;inset:0;background:rgba(0,0,0,0.9);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
</style>
</head>
<body>

<div id="homeScreen" class="screen active">
  <div class="logo-main">PIANO HERO</div>
  <div class="upload-zone" id="uploadZone">
    <p>Selecciona o arrastra tu MIDI</p>
    <input type="file" id="fileInput" accept=".mid,.midi">
  </div>
  <div id="songInfo" style="font-size:12px;color:#666"></div>
  <div class="btn-row">
    <button class="btn btn-glow" id="btnPlay" disabled>JUGAR</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div id="hud">
    <div><small style="display:block;font-size:8px;color:#555">SCORE</small><span class="hud-v" id="scoreV">0</span></div>
    <div id="healthTrack"><div id="healthFill"></div></div>
    <div><small style="display:block;font-size:8px;color:#555">COMBO</small><span class="hud-v" id="comboV">×0</span></div>
    <button id="btnPause" style="background:none;border:1px solid #333;color:#777;padding:5px 10px;border-radius:5px">PAUSA</button>
  </div>
  <div id="waitBar"><div id="waitText">ESPERANDO NOTA...</div></div>
  <div id="stageWrap">
    <canvas id="laneCanvas"></canvas>
    <div id="feedback"></div>
  </div>
  <div id="pianoWrapper"><div id="keysRow"></div></div>
  <div id="gameOverOv">
    <h1 style="color:#ff2d78;font-family:Orbitron">GAME OVER</h1>
    <button class="btn btn-glow" onclick="location.reload()">REINTENTAR</button>
  </div>
</div>

<script>
const KEY_GROUPS=[
  {lo:21,hi:35,label:'1',note:'DO₁',color:'#1a6aff',glow:'rgba(30,100,255,.9)'},
  {lo:36,hi:47,label:'2',note:'DO₂',color:'#1fc71f',glow:'rgba(30,200,60,.9)'},
  {lo:48,hi:59,label:'3',note:'DO₃',color:'#cc1a50',glow:'rgba(220,30,80,.9)'},
  {lo:60,hi:71,label:'4',note:'DO₄',color:'#cc8800',glow:'rgba(200,140,0,.9)'},
  {lo:72,hi:83,label:'5',note:'DO₅',color:'#7722ee',glow:'rgba(130,40,240,.9)'},
  {lo:84,hi:95,label:'6',note:'DO₆',color:'#cc5500',glow:'rgba(210,90,0,.9)'},
  {lo:96,hi:108,label:'7',note:'DO₇',color:'#009988',glow:'rgba(0,180,160,.9)'},
];

const G = {
    playing: false,
    elapsed: 0,
    startTime: 0,
    notes: [],
    spawnIdx: 0,
    score: 0,
    combo: 0,
    health: 100,
    waiting: false,
    chordIdx: 0,
    chords: []
};

let falling = [];
let actx, reverbNode, activeNotes = {};

// --- AUDIO ---
function initAudio() {
    if (!actx) {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        reverbNode = actx.createConvolver();
        const len = actx.sampleRate * 2;
        const buf = actx.createBuffer(2, len, actx.sampleRate);
        for (let c = 0; c < 2; c++) {
            let d = buf.getChannelData(c);
            for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * 0.5));
        }
        reverbNode.buffer = buf;
        reverbNode.connect(actx.destination);
    }
}

function startNote(midi) {
    initAudio();
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.2, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 1.5);
    osc.connect(gain); gain.connect(reverbNode);
    osc.start(); osc.stop(actx.currentTime + 1.5);
}

// --- MIDI PARSER (Simplificado) ---
async function loadMidi(file) {
    const buf = await file.arrayBuffer();
    // Aquí iría tu parser de MIDI real, usaremos una simulación para el ejemplo
    // Simulamos que cargó notas
    G.notes = Array.from({length: 50}, (_, i) => ({
        note: 60 + (i % 12),
        startMs: 2000 + i * 800,
        endMs: 2200 + i * 800,
        group: (i % 7)
    }));
    document.getElementById('btnPlay').disabled = false;
    document.getElementById('songInfo').textContent = "Listo: " + file.name;
}

// --- LOGICA DE JUEGO ---
let canvas, ctx, stageW, stageH;

function initCanvas() {
    canvas = document.getElementById('laneCanvas');
    ctx = canvas.getContext('2d');
    resize();
}

function resize() {
    stageW = canvas.width = canvas.parentElement.clientWidth;
    stageH = canvas.height = canvas.parentElement.clientHeight;
}

function loop(now) {
    if (!G.playing) return;
    
    if (!G.waiting) {
        G.elapsed = now - G.startTime;
    } else {
        G.startTime = now - G.elapsed; // Congelar tiempo
    }

    // Spawn notes
    while (G.spawnIdx < G.notes.length && G.notes[G.spawnIdx].startMs < G.elapsed + 3000) {
        falling.push({...G.notes[G.spawnIdx], hit: false, missed: false});
        G.spawnIdx++;
    }

    // SISTEMA DE SINCRONIZACIÓN (STRICT)
    const nextChord = G.notes.find(n => !n.hit && !n.missed);
    if (nextChord && nextChord.startMs <= G.elapsed + 100) {
        G.waiting = true;
        document.getElementById('waitBar').style.display = 'block';
        const key = document.querySelectorAll('.bigkey')[nextChord.group];
        key.classList.add('waiting');
    }

    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    falling.forEach(n => {
        if (G.elapsed > n.startMs + 500 && !n.hit && !n.missed) {
            n.missed = true;
            G.health -= 10;
            G.combo = 0;
            showFeedback("MISS", "#ff2d78");
            updateHUD();
        }
    });
    if (G.health <= 0) { G.playing = false; document.getElementById('gameOverOv').style.display = 'flex'; }
}

function handleInput(groupIdx) {
    if (!G.playing) return;
    
    // Solo permitir el acierto si la nota está en el rango de tiempo correcto (Sync)
    const target = falling.find(n => n.group === groupIdx && !n.hit && !n.missed && Math.abs(n.startMs - G.elapsed) < 300);
    
    if (target) {
        target.hit = true;
        G.score += 100 + G.combo * 10;
        G.combo++;
        G.waiting = false;
        document.getElementById('waitBar').style.display = 'none';
        document.querySelectorAll('.bigkey')[groupIdx].classList.remove('waiting');
        showFeedback("PERFECT", "#00f5ff");
        startNote(target.note);
        updateHUD();
    } else {
        // Penalizar si toca antes de tiempo o tecla equivocada
        G.health -= 5;
        G.combo = 0;
        showFeedback("EARLY!", "#ffcc00");
        updateHUD();
    }
}

function draw() {
    ctx.clearRect(0, 0, stageW, stageH);
    const hitY = stageH * 0.85;

    falling.forEach(n => {
        if (n.hit || n.missed) return;
        
        // Calcular posición basada en tiempo restante
        const timeToHit = n.startMs - G.elapsed;
        const y = hitY - (timeToHit * (stageH / 3000));
        const x = (stageW / 7) * n.group + (stageW / 14);
        
        if (y < 0) return;

        ctx.fillStyle = KEY_GROUPS[n.group].color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });

    // Hit Zone
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, hitY); ctx.lineTo(stageW, hitY);
    ctx.stroke();
}

function updateHUD() {
    document.getElementById('scoreV').textContent = G.score;
    document.getElementById('comboV').textContent = "×" + G.combo;
    document.getElementById('healthFill').style.width = G.health + "%";
}

function showFeedback(txt, col) {
    const fb = document.getElementById('feedback');
    fb.textContent = txt;
    fb.style.color = col;
    fb.style.opacity = 1;
    setTimeout(() => fb.style.opacity = 0, 500);
}

// --- EVENTOS ---
document.getElementById('uploadZone').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => loadMidi(e.target.files[0]);
document.getElementById('btnPlay').onclick = () => {
    document.getElementById('homeScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');
    resize();
    G.playing = true;
    G.startTime = performance.now();
    requestAnimationFrame(loop);
};

// Crear Teclado
const keysRow = document.getElementById('keysRow');
KEY_GROUPS.forEach((kg, i) => {
    const div = document.createElement('div');
    div.className = 'bigkey';
    div.style.backgroundColor = kg.color + "22";
    div.style.borderColor = kg.color + "44";
    div.innerHTML = `<span>${kg.label}</span><small>${kg.note}</small>`;
    
    const press = (e) => { 
        e.preventDefault(); 
        div.classList.add('pressed'); 
        handleInput(i); 
    };
    const release = () => div.classList.remove('pressed');
    
    div.onmousedown = press; div.onmouseup = release;
    div.ontouchstart = press; div.ontouchend = release;
    keysRow.appendChild(div);
});

window.onresize = resize;
initCanvas();
</script>
</body>
</html>
